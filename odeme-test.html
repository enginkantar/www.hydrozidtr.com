<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Test Ödeme — Hydrozid®</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #070B14; color: #CBD5E1; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #0F172A; border: 1px solid #1E293B; border-radius: 16px;
      max-width: 440px; width: 100%; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .test-banner {
      background: #422006; border: 1px solid #a16207; color: #fbbf24;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; text-align: center;
      margin-bottom: 24px; font-weight: 600;
    }
    .head { text-align: center; margin-bottom: 24px; }
    .head .lock { font-size: 28px; }
    .head h1 { font-size: 1.15rem; color: #fff; margin: 8px 0 4px; }
    .head p { font-size: 13px; color: #64748B; }
    .amount {
      text-align: center; background: #0B1220; border: 1px solid #1E293B;
      border-radius: 12px; padding: 18px; margin-bottom: 24px;
    }
    .amount .pkg { font-size: 13px; color: #94A3B8; margin-bottom: 4px; }
    .amount .val { font-size: 1.9rem; font-weight: 800; color: #00D4FF; }
    label { display: block; font-size: 12px; color: #94A3B8; margin: 14px 0 6px; }
    input {
      width: 100%; background: #0B1220; border: 1px solid #1E293B; border-radius: 8px;
      padding: 12px 14px; color: #E2E8F0; font-size: 15px; letter-spacing: .5px;
    }
    input:focus { outline: none; border-color: #00D4FF; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .field .err { color: #F87171; font-size: 0.78rem; font-weight: 700; margin-top: 5px; display: none; }
    .field.invalid .err { display: block; animation: pulse 0.9s ease-in-out infinite; }
    .field.invalid input { border-color: #EF4444 !important; animation: bpulse 0.9s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes bpulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} 50%{box-shadow:0 0 0 3px rgba(239,68,68,0.3)} }
    #banner { display:none; background:rgba(239,68,68,0.12); border:1px solid #EF4444; color:#FCA5A5;
      border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:0.82rem; font-weight:700; }
    #banner.show { display:block; }
    .btn {
      width: 100%; border: none; border-radius: 10px; padding: 15px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: opacity .2s;
    }
    .btn-pay { background: linear-gradient(135deg, #0891b2, #22C55E); color: #fff; }
    .btn-pay:hover { opacity: .9; }
    .btn-pay:disabled { opacity: .6; cursor: wait; }
    .btn-fail {
      background: transparent; color: #64748B; border: 1px solid #1E293B;
      margin-top: 10px; font-size: 13px; padding: 11px;
    }
    .btn-fail:hover { color: #ef4444; border-color: #7f1d1d; }
    .secure { text-align: center; font-size: 11px; color: #475569; margin-top: 18px; }
    /* Güven rozetleri (footer ile aynı) */
    .trust { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; margin-top: 18px; }
    .trust-chip { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 10px; padding: 7px 12px; }
    .trust-chip img { display: block; height: 22px; width: auto; }
    .trust-chip span { font-size: 0.72rem; font-weight: 700; color: #1e293b; white-space: nowrap; }
    .trust-batu img { height: 26px; }
    .trust-etbis span { color: #7a5c1e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="test-banner">⚠️ TEST ORTAMI — Gerçek çekim yapılmaz. Test kartı: 9999 9999 9999 9999</div>
    <div class="head">
      <div class="lock">🔒</div>
      <h1>Güvenli Ödeme (Simülasyon)</h1>
      <p>Kart bilgileri kaydedilmez — bu bir test ekranıdır</p>
    </div>
    <div class="amount">
      <div class="pkg" id="pkgLabel">Paket</div>
      <div class="val" id="amtLabel">—</div>
    </div>

    <div id="banner"></div>
    <form id="payForm" novalidate>
      <div class="field" id="f-name">
        <label>Kart Üzerindeki İsim</label>
        <input type="text" id="cardName" value="9999 9999" autocomplete="off">
        <div class="err"></div>
      </div>
      <div class="field" id="f-no">
        <label>Kart Numarası</label>
        <input type="text" id="cardNo" value="9999 9999 9999 9999" maxlength="19" inputmode="numeric" autocomplete="off">
        <div class="err"></div>
      </div>
      <div class="row">
        <div class="field" id="f-exp">
          <label>Son Kullanma (AA/YY)</label>
          <input type="text" id="cardExp" value="12/30" maxlength="5" inputmode="numeric" autocomplete="off">
          <div class="err"></div>
        </div>
        <div class="field" id="f-cvv">
          <label>CVV</label>
          <input type="text" id="cardCvv" value="999" maxlength="4" inputmode="numeric" autocomplete="off">
          <div class="err"></div>
        </div>
      </div>
      <button type="submit" class="btn btn-pay" id="payBtn">Ödemeyi Tamamla</button>
      <button type="button" class="btn btn-fail" id="failBtn">Başarısız Ödeme Simüle Et</button>
    </form>
    <div class="secure">🛡️ Bu ekran ödeme sağlayıcısını taklit eder — canlıda HalkÖde 3D Secure kullanılır.</div>
    <div class="trust">
      <div class="trust-chip trust-batu">
        <img src="/assets/batu-medikal-logo.jpg" alt="Batu Medikal" loading="lazy">
        <span>güvencesi ile</span>
      </div>
      <div class="trust-chip">
        <img src="/assets/odeme-logolari.png" alt="Mastercard · Visa · Troy · tüm kredi ve banka kartları" loading="lazy">
      </div>
      <div class="trust-chip trust-etbis">
        <img src="/assets/logo-tic-3.png" alt="T.C. Ticaret Bakanlığı" loading="lazy">
        <span>ETBİS'E KAYITLIDIR</span>
      </div>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const oid = p.get('oid') || '';
    const amt = p.get('amt') || '';
    const pkg = p.get('pkg') || 'Paket';
    document.getElementById('pkgLabel').textContent = 'Hydrozid® ' + pkg;
    document.getElementById('amtLabel').textContent = amt ? Number(amt).toLocaleString('tr-TR') + ' ₺' : '—';

    // ─── Girdi formatlama ───
    const noEl = document.getElementById('cardNo');
    const expEl = document.getElementById('cardExp');
    const cvvEl = document.getElementById('cardCvv');
    noEl.addEventListener('input', () => {
      let d = noEl.value.replace(/\D/g, '').slice(0, 16);
      noEl.value = d.replace(/(.{4})/g, '$1 ').trim();
      clearErr('f-no');
    });
    expEl.addEventListener('input', () => {
      let d = expEl.value.replace(/\D/g, '').slice(0, 4);
      expEl.value = d.length >= 3 ? d.slice(0, 2) + '/' + d.slice(2) : d;
      clearErr('f-exp');
    });
    cvvEl.addEventListener('input', () => { cvvEl.value = cvvEl.value.replace(/\D/g, '').slice(0, 4); clearErr('f-cvv'); });
    document.getElementById('cardName').addEventListener('input', () => clearErr('f-name'));

    // ─── Validasyon ───
    function setErr(fid, msg) {
      const f = document.getElementById(fid);
      f.classList.add('invalid');
      f.querySelector('.err').textContent = '⚠️ ' + msg;
      f.querySelector('input').focus();
    }
    function clearErr(fid) { document.getElementById(fid).classList.remove('invalid'); }
    function clearAll() {
      ['f-name', 'f-no', 'f-exp', 'f-cvv'].forEach(clearErr);
      const b = document.getElementById('banner'); b.classList.remove('show'); b.textContent = '';
    }
    function validate() {
      const name = document.getElementById('cardName').value.trim();
      const no = noEl.value.replace(/\s/g, '');
      const exp = expEl.value.trim();
      const cvv = cvvEl.value.trim();
      if (!name) return { fid: 'f-name', msg: 'Kart üzerindeki ismi giriniz.' };
      if (name.length < 2) return { fid: 'f-name', msg: 'Geçerli bir isim giriniz.' };
      if (!no) return { fid: 'f-no', msg: 'Kart numarasını giriniz.' };
      if (!/^\d+$/.test(no)) return { fid: 'f-no', msg: 'Kart numarası yalnızca rakamlardan oluşmalıdır.' };
      if (no.length !== 16) return { fid: 'f-no', msg: 'Kart numarası 16 haneli olmalıdır.' };
      if (!exp) return { fid: 'f-exp', msg: 'Son kullanma tarihini giriniz.' };
      const m = exp.match(/^(\d{2})\/(\d{2})$/);
      if (!m) return { fid: 'f-exp', msg: 'Tarih AA/YY formatında olmalıdır (örn. 12/30).' };
      const mm = +m[1], yy = +m[2];
      if (mm < 1 || mm > 12) return { fid: 'f-exp', msg: 'Ay 01 ile 12 arasında olmalıdır.' };
      const now = new Date(), curY = now.getFullYear() % 100, curM = now.getMonth() + 1;
      if (yy < curY || (yy === curY && mm < curM)) return { fid: 'f-exp', msg: 'Kartın son kullanma tarihi geçmiş.' };
      if (!cvv) return { fid: 'f-cvv', msg: 'CVV giriniz.' };
      if (!/^\d{3,4}$/.test(cvv)) return { fid: 'f-cvv', msg: 'CVV 3 veya 4 rakam olmalıdır.' };
      return null;
    }

    document.getElementById('payForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearAll();
      const err = validate();
      if (err) { setErr(err.fid, err.msg); return; }
      const btn = document.getElementById('payBtn');
      btn.disabled = true; btn.textContent = 'İşleniyor...';
      setTimeout(function () {
        location.href = '/odeme-basarili.html?order_no=' + encodeURIComponent(oid) + '&mock=1';
      }, 1200);
    });

    document.getElementById('failBtn').addEventListener('click', function () {
      location.href = '/odeme-hatasi.html?order_no=' + encodeURIComponent(oid) + '&mock=1';
    });
  </script>
</body>
</html>
