<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Test Ödeme — Hydrozid®</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #070B14; color: #CBD5E1; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #0F172A; border: 1px solid #1E293B; border-radius: 16px;
      max-width: 440px; width: 100%; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .test-banner {
      background: rgba(0, 212, 255, 0.08); border: 1px solid rgba(0, 212, 255, 0.2); color: #00D4FF;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; text-align: center;
      margin-bottom: 24px; font-weight: 600;
    }
    .head { text-align: center; margin-bottom: 24px; }
    .head .lock { font-size: 28px; }
    .head h1 { font-size: 1.15rem; color: #fff; margin: 8px 0 4px; }
    .head p { font-size: 13px; color: #64748B; }
    .amount {
      text-align: center; background: #0B1220; border: 1px solid #1E293B;
      border-radius: 12px; padding: 18px; margin-bottom: 24px;
    }
    .amount .pkg { font-size: 13px; color: #94A3B8; margin-bottom: 4px; }
    .amount .val { font-size: 1.9rem; font-weight: 800; color: #00D4FF; }
    label { display: block; font-size: 12px; color: #94A3B8; margin: 14px 0 6px; }
    input {
      width: 100%; background: #0B1220; border: 1px solid #1E293B; border-radius: 8px;
      padding: 12px 14px; color: #E2E8F0; font-size: 15px; letter-spacing: .5px;
    }
    input:focus { outline: none; border-color: #00D4FF; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .field .err { color: #F87171; font-size: 0.78rem; font-weight: 700; margin-top: 5px; display: none; }
    .field.invalid .err { display: block; animation: pulse 0.9s ease-in-out infinite; }
    .field.invalid input { border-color: #EF4444 !important; animation: bpulse 0.9s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes bpulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} 50%{box-shadow:0 0 0 3px rgba(239,68,68,0.3)} }
    #banner { display:none; background:rgba(239,68,68,0.12); border:1px solid #EF4444; color:#FCA5A5;
      border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:0.82rem; font-weight:700; }
    #banner.show { display:block; }
    .btn {
      width: 100%; border: none; border-radius: 10px; padding: 15px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: opacity .2s;
    }
    .btn-pay { background: linear-gradient(135deg, #0891b2, #22C55E); color: #fff; }
    .btn-pay:hover { opacity: .9; }
    .btn-pay:disabled { opacity: .6; cursor: wait; }
    .btn-fail {
      background: transparent; color: #64748B; border: 1px solid #1E293B;
      margin-top: 10px; font-size: 13px; padding: 11px;
    }
    .btn-fail:hover { color: #ef4444; border-color: #7f1d1d; }
    .secure { text-align: center; font-size: 11px; color: #475569; margin-top: 18px; }
    .secure strong { color: #94A3B8; }
    /* Güven rozetleri (footer ile aynı) */
    .trust { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; margin-top: 18px; }
    .trust-chip { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 10px; padding: 7px 12px; }
    .trust-chip img { display: block; height: 22px; width: auto; }
    .trust-chip span { font-size: 0.72rem; font-weight: 700; color: #1e293b; white-space: nowrap; }
    .trust-batu img { height: 26px; }
    .trust-etbis span { color: #7a5c1e; }
    .hidden { display: none !important; }
    .notice { margin-top: 14px; font-size: 12px; color: #94A3B8; line-height: 1.5; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="test-banner" id="modeBanner">Güvenli ödeme alanı</div>
    <div class="head">
      <div class="lock">🔒</div>
      <h1 id="pageTitle">Güvenli Ödeme</h1>
      <p id="pageDesc">Kart bilgileri sitemizde saklanmaz</p>
    </div>
    <div class="amount">
      <div class="pkg" id="pkgLabel">Paket</div>
      <div class="val" id="amtLabel">—</div>
    </div>

    <div id="banner"></div>
    <form id="payForm" novalidate>
      <div id="wlFields" class="hidden">
        <div class="field">
          <label>Ad Soyad</label>
          <input type="text" id="customerName" autocomplete="name" readonly>
        </div>
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="customerEmail" autocomplete="email" readonly>
        </div>
        <div class="field">
          <label>Telefon</label>
          <input type="text" id="customerPhone" autocomplete="tel" readonly>
        </div>
        <div class="field">
          <label>Fatura / Teslimat Adresi</label>
          <input type="text" id="customerAddress" autocomplete="street-address" readonly>
        </div>
        <div class="notice" id="wlNotice">Form doğrudan ödeme sağlayıcısına gönderilir.</div>
      </div>
      <div class="field" id="f-name">
        <label>Kart Üzerindeki İsim</label>
        <input type="text" id="cardName" value="9999 9999" autocomplete="off">
        <div class="err"></div>
      </div>
      <div class="field" id="f-no">
        <label>Kart Numarası</label>
        <input type="text" id="cardNo" value="9999 9999 9999 9999" maxlength="19" inputmode="numeric" autocomplete="off">
        <div class="err"></div>
      </div>
      <div class="row">
        <div class="field" id="f-exp">
          <label>Son Kullanma (AA/YY)</label>
          <input type="text" id="cardExp" value="12/30" maxlength="5" inputmode="numeric" autocomplete="off">
          <div class="err"></div>
        </div>
        <div class="field" id="f-cvv">
          <label>CVV</label>
          <input type="text" id="cardCvv" value="999" maxlength="4" inputmode="numeric" autocomplete="off">
          <div class="err"></div>
        </div>
      </div>
      <button type="submit" class="btn btn-pay" id="payBtn">Ödemeyi Tamamla</button>
      <button type="button" class="btn btn-fail" id="failBtn">Başarısız Ödeme Simüle Et</button>
    </form>
    <div class="secure" id="secureNote">🛡️ Bu ekran ödeme sağlayıcısını taklit eder — canlıda HalkÖde 3D Secure kullanılır.</div>
    <div class="trust">
      <div class="trust-chip trust-batu">
        <img src="/assets/batu-medikal-logo.jpg" alt="Batu Medikal" loading="lazy">
        <span>güvencesi ile</span>
      </div>
      <div class="trust-chip">
        <img src="/assets/odeme-logolari.png" alt="Mastercard · Visa · Troy · tüm kredi ve banka kartları" loading="lazy">
      </div>
      <div class="trust-chip trust-etbis">
        <img src="/assets/logo-tic-3.png" alt="T.C. Ticaret Bakanlığı" loading="lazy">
        <span>ETBİS'E KAYITLIDIR</span>
      </div>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const oid = p.get('oid') || '';
    const amt = p.get('amt') || '';
    const pkg = p.get('pkg') || 'Paket';
    const wl = p.get('wl') === '1';
    const mock = p.get('mock') === '1';
    const noEl = document.getElementById('cardNo');
    const expEl = document.getElementById('cardExp');
    const cvvEl = document.getElementById('cardCvv');
    const payForm = document.getElementById('payForm');
    const payBtn = document.getElementById('payBtn');
    const failBtn = document.getElementById('failBtn');
    const modeBanner = document.getElementById('modeBanner');
    const secureNote = document.getElementById('secureNote');
    const pageTitle = document.getElementById('pageTitle');
    const pageDesc = document.getElementById('pageDesc');
    const wlFields = document.getElementById('wlFields');

    document.getElementById('pkgLabel').textContent = 'Hydrozid® ' + pkg;
    document.getElementById('amtLabel').textContent = amt ? Number(amt).toLocaleString('tr-TR') + ' ₺' : '—';

    const state = {
      init: null,
      actionUrl: '',
    };

    function setErr(fid, msg) {
      const f = document.getElementById(fid);
      f.classList.add('invalid');
      f.querySelector('.err').textContent = '⚠️ ' + msg;
      f.querySelector('input').focus();
    }
    function clearErr(fid) { document.getElementById(fid).classList.remove('invalid'); }
    function clearAll() {
      ['f-name', 'f-no', 'f-exp', 'f-cvv'].forEach(clearErr);
      const b = document.getElementById('banner'); b.classList.remove('show'); b.textContent = '';
    }
    function validate() {
      const name = document.getElementById('cardName').value.trim();
      const no = noEl.value.replace(/\s/g, '');
      const exp = expEl.value.trim();
      const cvv = cvvEl.value.trim();
      if (!name) return { fid: 'f-name', msg: 'Kart üzerindeki ismi giriniz.' };
      if (name.length < 2) return { fid: 'f-name', msg: 'Geçerli bir isim giriniz.' };
      if (!no) return { fid: 'f-no', msg: 'Kart numarasını giriniz.' };
      if (!/^\d+$/.test(no)) return { fid: 'f-no', msg: 'Kart numarası yalnızca rakamlardan oluşmalıdır.' };
      if (no.length !== 16) return { fid: 'f-no', msg: 'Kart numarası 16 haneli olmalıdır.' };
      if (!exp) return { fid: 'f-exp', msg: 'Son kullanma tarihini giriniz.' };
      const m = exp.match(/^(\d{2})\/(\d{2})$/);
      if (!m) return { fid: 'f-exp', msg: 'Tarih AA/YY formatında olmalıdır (örn. 12/30).' };
      const mm = +m[1], yy = +m[2];
      if (mm < 1 || mm > 12) return { fid: 'f-exp', msg: 'Ay 01 ile 12 arasında olmalıdır.' };
      const now = new Date(), curY = now.getFullYear() % 100, curM = now.getMonth() + 1;
      if (yy < curY || (yy === curY && mm < curM)) return { fid: 'f-exp', msg: 'Kartın son kullanma tarihi geçmiş.' };
      if (!cvv) return { fid: 'f-cvv', msg: 'CVV giriniz.' };
      if (!/^\d{3,4}$/.test(cvv)) return { fid: 'f-cvv', msg: 'CVV 3 veya 4 rakam olmalıdır.' };
      return null;
    }

    noEl.addEventListener('input', () => {
      let d = noEl.value.replace(/\D/g, '').slice(0, 16);
      noEl.value = d.replace(/(.{4})/g, '$1 ').trim();
      clearErr('f-no');
    });
    expEl.addEventListener('input', () => {
      let d = expEl.value.replace(/\D/g, '').slice(0, 4);
      expEl.value = d.length >= 3 ? d.slice(0, 2) + '/' + d.slice(2) : d;
      clearErr('f-exp');
    });
    cvvEl.addEventListener('input', () => { cvvEl.value = cvvEl.value.replace(/\D/g, '').slice(0, 4); clearErr('f-cvv'); });
    document.getElementById('cardName').addEventListener('input', () => clearErr('f-name'));

    async function initWhiteLabel() {
      const invoiceId = p.get('invoice_id');
      if (!invoiceId) {
        modeBanner.textContent = '⚠️ White-label mod için invoice_id gerekiyor.';
        return;
      }
      const res = await fetch('/api/payment/whitelabel-init?invoice_id=' + encodeURIComponent(invoiceId));
      const data = await res.json();
      if (!res.ok) throw new Error(data && data.error ? data.error : 'White-label init failed');
      state.init = data;
      state.actionUrl = data.action_url;
      modeBanner.textContent = 'Güvenli ödeme alanı';
      pageTitle.textContent = 'Güvenli Ödeme';
      pageDesc.textContent = 'Kart bilgileri sitemizde saklanmaz';
      secureNote.innerHTML = '🛡️ Bu ekran doğrudan ödeme sağlayıcısının akışını kullanır.';
      wlFields.classList.remove('hidden');
      document.getElementById('cardName').value = '';
      document.getElementById('cardNo').value = '';
      document.getElementById('cardExp').value = '';
      document.getElementById('cardCvv').value = '';
      document.getElementById('customerName').value = data.name + ' ' + data.surname;
      document.getElementById('customerEmail').value = data.bill_email || '';
      document.getElementById('customerPhone').value = data.bill_phone || '';
      document.getElementById('customerAddress').value = data.bill_address1 || '';
      payBtn.textContent = 'Ödemeyi Tamamla';
      failBtn.textContent = 'İptal Et';
      failBtn.onclick = function () {
        location.href = (data.cancel_url || '/odeme-hatasi.html') + '?invoice_id=' + encodeURIComponent(data.invoice_id) + '&mock=0';
      };
      payForm.addEventListener('submit', handleWhiteLabelSubmit);
      return data;
    }

    function addHidden(form, name, value) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = name;
      input.value = value == null ? '' : String(value);
      form.appendChild(input);
    }

    function handleWhiteLabelSubmit(e) {
      e.preventDefault();
      clearAll();
      if (!state.init || !state.actionUrl) {
        document.getElementById('banner').textContent = 'White-label ödeme bilgileri yüklenemedi.';
        document.getElementById('banner').classList.add('show');
        return;
      }

      const err = validate();
      if (err) { setErr(err.fid, err.msg); return; }

      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = 'Sağlayıcıya gönderiliyor...';

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = state.actionUrl;
      form.style.display = 'none';
      addHidden(form, 'merchant_key', state.init.merchant_key);
      addHidden(form, 'invoice_id', state.init.invoice_id);
      addHidden(form, 'invoice_description', state.init.invoice_description);
      addHidden(form, 'total', state.init.total);
      addHidden(form, 'currency_id', state.init.currency_id || 1);
      addHidden(form, 'currency_code', state.init.currency_code);
      addHidden(form, 'items', JSON.stringify(state.init.items || []));
      addHidden(form, 'return_url', state.init.return_url);
      addHidden(form, 'cancel_url', state.init.cancel_url);
      addHidden(form, 'response_method', state.init.response_method || 'GET');
      addHidden(form, 'name', state.init.name);
      addHidden(form, 'surname', state.init.surname);
      addHidden(form, 'bill_address1', state.init.bill_address1);
      addHidden(form, 'bill_address2', state.init.bill_address2 || '');
      addHidden(form, 'bill_city', state.init.bill_city);
      addHidden(form, 'bill_state', state.init.bill_state);
      addHidden(form, 'bill_postcode', state.init.bill_postcode || '');
      addHidden(form, 'bill_country', state.init.bill_country);
      addHidden(form, 'bill_email', state.init.bill_email);
      addHidden(form, 'bill_phone', state.init.bill_phone);
      addHidden(form, 'sale_web_hook_key', state.init.sale_web_hook_key);
      addHidden(form, 'ip', state.init.ip);
      addHidden(form, 'saved_card', state.init.saved_card || 0);
      addHidden(form, 'maturity_period', state.init.maturity_period || 0);
      addHidden(form, 'payment_frequency', state.init.payment_frequency || 0);
      addHidden(form, 'installments_number', String(state.init.installments_number || 1));
      addHidden(form, 'transaction_type', state.init.transaction_type || 'Auth');
      addHidden(form, 'hash_key', state.init.hash_key);
      addHidden(form, 'order_id', state.init.order_id || '');
      addHidden(form, 'cc_holder_name', document.getElementById('cardName').value.trim());
      addHidden(form, 'cc_no', noEl.value.replace(/\s/g, ''));
      addHidden(form, 'expiry_month', expEl.value.split('/')[0] || '');
      addHidden(form, 'expiry_year', expEl.value.split('/')[1] || '');
      addHidden(form, 'cvv', cvvEl.value.trim());
      document.body.appendChild(form);
      form.submit();
    }

    if (wl) {
      modeBanner.textContent = '⚠️ White-label ödeme modu yükleniyor...';
      pageTitle.textContent = 'Güvenli Ödeme';
      pageDesc.textContent = 'White-label 3D Secure ödeme ekranı';
      secureNote.innerHTML = '🛡️ Bu ekran doğrudan ödeme sağlayıcısının akışını kullanır.';
      failBtn.textContent = 'İptal Et';
      wlFields.classList.remove('hidden');
      initWhiteLabel().catch(err => {
        modeBanner.textContent = '⚠️ White-label init hata verdi: ' + err.message;
        document.getElementById('banner').textContent = err.message;
        document.getElementById('banner').classList.add('show');
      });
    } else if (mock) {
      failBtn.textContent = 'Başarısız Ödeme Simüle Et';
      payForm.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAll();
        const err = validate();
        if (err) { setErr(err.fid, err.msg); return; }
        const btn = document.getElementById('payBtn');
        btn.disabled = true; btn.textContent = 'İşleniyor...';
        setTimeout(function () {
          location.href = '/odeme-basarili.html?order_no=' + encodeURIComponent(oid) + '&mock=1';
        }, 1200);
      });
      failBtn.addEventListener('click', function () {
        location.href = '/odeme-hatasi.html?order_no=' + encodeURIComponent(oid) + '&mock=1';
      });
    } else {
      payForm.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAll();
        const err = validate();
        if (err) { setErr(err.fid, err.msg); return; }
        location.href = '/odeme-basarili.html?order_no=' + encodeURIComponent(oid || '') + '&mock=1';
      });
      failBtn.addEventListener('click', function () {
        location.href = '/odeme-hatasi.html?order_no=' + encodeURIComponent(oid || '') + '&mock=1';
      });
    }
  </script>
</body>
</html>
